<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Yoshi Flower Settings</title>
<!--
  Hosted configuration page for the Yoshi Flower watchface.

  This replaces Clay. pkjs now runs in the Moddable XS sandbox, whose small
  heap can't hold Clay's ~125 KB inline config page (it aborted with
  xsPlatform.c fxAbort "memory full" the moment Settings opened). A hosted
  page keeps all of this HTML/CSS/JS off the XS heap: the phone only opens a
  URL and parses a small JSON reply.

  Contract with src/pkjs/index.js:
    - current settings arrive as ?v=<URI-encoded JSON> (named keys, see below)
    - on Save we navigate to pebblejs://close#<URI-encoded JSON> with the same
      named keys; colors are 24-bit RGB ints, toggles 0/1, YoshiColor 0..3
      (exactly what the watch's Message channel / applySettings expects).
-->
<style>
  :root { --accent:#00aa55; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:#f2f2f2; color:#222; -webkit-text-size-adjust:100%; }
  header { background:#55ffaa; color:#0a3d27; padding:18px 16px; text-align:center; }
  header h1 { margin:0; font-size:22px; }
  header p { margin:6px 0 0; font-size:13px; opacity:.85; }
  .section { background:#fff; margin:12px 0; border-top:1px solid #e2e2e2; border-bottom:1px solid #e2e2e2; }
  .section h2 { margin:0; padding:12px 16px 6px; font-size:13px; text-transform:uppercase;
                letter-spacing:.05em; color:#888; }
  .row { display:flex; align-items:center; justify-content:space-between;
         padding:12px 16px; border-top:1px solid #f0f0f0; }
  .row:first-of-type { border-top:none; }
  .row label { font-size:16px; }
  .note { padding:4px 16px 12px; font-size:13px; color:#777; }
  input[type=color] { width:48px; height:32px; border:none; background:none; padding:0; }
  .switch { position:relative; width:50px; height:30px; flex:0 0 auto; }
  .switch input { opacity:0; width:0; height:0; }
  .slider { position:absolute; inset:0; background:#ccc; border-radius:30px; transition:.2s; }
  .slider:before { content:""; position:absolute; height:24px; width:24px; left:3px; top:3px;
                   background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .slider { background:var(--accent); }
  .switch input:checked + .slider:before { transform:translateX(20px); }
  .yoshi-row { display:flex; padding:8px 12px 14px; }
  .yoshi-opt { flex:1; margin:0 4px; text-align:center; cursor:pointer; opacity:.4;
               padding:8px 2px; border-radius:10px; transition:opacity .12s, background .12s; }
  .yoshi-opt.selected { opacity:1; background:rgba(0,0,0,.08); }
  .yoshi-thumb { display:block; width:100%; padding-bottom:100%; background-size:contain;
                 background-position:center; background-repeat:no-repeat; }
  .yoshi-name { display:block; font-size:12px; margin-top:6px; }
  .actions { padding:18px 16px 28px; }
  button { width:100%; padding:14px; font-size:17px; border:none; border-radius:10px; cursor:pointer; }
  .save { background:var(--accent); color:#fff; }
  .cancel { background:none; color:#888; margin-top:8px; }
</style>
</head>
<body>
<header>
  <h1>Yoshi Flower</h1>
  <p>Customize &amp; add or remove complications.</p>
</header>

<div class="section">
  <h2>Background</h2>
  <div class="row"><label for="bg">Background Color</label><input type="color" id="bg"></div>
  <div class="row"><label for="dots">Show Dots</label>
    <span class="switch"><input type="checkbox" id="dots"><span class="slider"></span></span></div>
  <div class="row"><label for="dot">Dot Color</label><input type="color" id="dot"></div>
</div>

<div class="section">
  <h2>Display</h2>
  <div class="row"><label for="date">Show Date</label>
    <span class="switch"><input type="checkbox" id="date"><span class="slider"></span></span></div>
  <div class="row"><label for="weather">Show Weather</label>
    <span class="switch"><input type="checkbox" id="weather"><span class="slider"></span></span></div>
  <div class="row"><label for="unit">Fahrenheit (off = Celsius)</label>
    <span class="switch"><input type="checkbox" id="unit"><span class="slider"></span></span></div>
</div>

<div class="section">
  <h2>Yoshi Mode</h2>
  <p class="note">Adds Yoshi as the flower face. His tongue points at the minutes.</p>
  <div class="row"><label for="yoshi">Yoshi Mode</label>
    <span class="switch"><input type="checkbox" id="yoshi"><span class="slider"></span></span></div>
  <div class="yoshi-row" id="yoshiRow"></div>
</div>

<div class="actions">
  <button class="save" id="save">Save</button>
  <button class="cancel" id="cancel">Cancel</button>
</div>

<script>
(function () {
  // Thumbnails are hot-linked from the repo (same as the old Clay picker), so
  // they cost zero watch resource slots. They render fine cross-origin.
  var IMG_BASE = 'https://raw.githubusercontent.com/Freilan/PebbleFace/main/config-images/';
  var COLORS = [
    { value:0, name:'Green',      file:'yoshi_green.png'  },
    { value:1, name:'Light Blue', file:'yoshi_lblue.png'  },
    { value:2, name:'Red',        file:'yoshi_red.png'    },
    { value:3, name:'Yellow',     file:'yoshi_yellow.png' }
  ];
  // Defaults match the watch's built-in defaults (src/embeddedjs/main.js).
  var DEFAULTS = {
    BackgroundColor: 0x55ffaa, ShowDots: 1, DotColor: 0x00aa55,
    ShowDate: 1, ShowWeather: 1, TemperatureUnit: 1,
    YoshiMode: 0, YoshiColor: 0
  };

  function getParam(name) {
    var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }
  var current = {};
  try { current = JSON.parse(getParam('v') || '{}') || {}; } catch (e) { current = {}; }
  function val(k) { return (k in current) ? current[k] : DEFAULTS[k]; }

  function toHex(n) { return '#' + (Number(n) & 0xFFFFFF).toString(16).padStart(6, '0'); }
  function fromHex(h) { return parseInt(h.replace('#', ''), 16) & 0xFFFFFF; }

  document.getElementById('bg').value        = toHex(val('BackgroundColor'));
  document.getElementById('dot').value       = toHex(val('DotColor'));
  document.getElementById('dots').checked    = !!val('ShowDots');
  document.getElementById('date').checked    = !!val('ShowDate');
  document.getElementById('weather').checked = !!val('ShowWeather');
  document.getElementById('unit').checked    = !!val('TemperatureUnit');
  document.getElementById('yoshi').checked   = !!val('YoshiMode');

  var selColor = Number(val('YoshiColor')) || 0;
  var row = document.getElementById('yoshiRow');
  function paint() {
    Array.prototype.forEach.call(row.children, function (el) {
      el.className = 'yoshi-opt' + (Number(el.dataset.value) === selColor ? ' selected' : '');
    });
  }
  COLORS.forEach(function (c) {
    var opt = document.createElement('div');
    opt.className = 'yoshi-opt';
    opt.setAttribute('data-value', c.value);
    opt.innerHTML =
      '<span class="yoshi-thumb" style="background-image:url(' + IMG_BASE + c.file + ')"></span>' +
      '<span class="yoshi-name">' + c.name + '</span>';
    opt.addEventListener('click', function () { selColor = c.value; paint(); });
    row.appendChild(opt);
  });
  paint();

  function close(hash) { document.location = 'pebblejs://close#' + hash; }

  document.getElementById('save').addEventListener('click', function () {
    var out = {
      BackgroundColor: fromHex(document.getElementById('bg').value),
      ShowDots:        document.getElementById('dots').checked    ? 1 : 0,
      DotColor:        fromHex(document.getElementById('dot').value),
      ShowDate:        document.getElementById('date').checked    ? 1 : 0,
      ShowWeather:     document.getElementById('weather').checked ? 1 : 0,
      TemperatureUnit: document.getElementById('unit').checked    ? 1 : 0,
      YoshiMode:       document.getElementById('yoshi').checked   ? 1 : 0,
      YoshiColor:      selColor
    };
    close(encodeURIComponent(JSON.stringify(out)));
  });

  document.getElementById('cancel').addEventListener('click', function () { close(''); });
})();
</script>
</body>
</html>
